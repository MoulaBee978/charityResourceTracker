<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharityConnect — Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a class="brand" href="{{ url_for('index') }}">CharityConnect</a>
            <ul class="nav-links">
                <li><a href="{{ url_for('index') }}">🏠 Home</a></li>
                <li><a href="{{ url_for('register') }}">📝 Register</a></li>
                <li><a href="{{ url_for('login') }}">🔐 Login</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1>✨ Create an Account</h1>
        <p style="color: #718096; margin-bottom: 24px;">Join us and make a difference in someone's life</p>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="username">👤 Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a unique username" required minlength="3">
                <span class="form-hint">At least 3 characters</span>
            </div>

            <div class="form-group">
                <label for="email">📧 Email Address</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
                <span class="form-hint">We'll keep your email secure</span>
            </div>

            <div class="form-group">
                <label for="password">🔑 Password</label>
                <input type="password" id="password" name="password" placeholder="Create a strong password" required minlength="6">
                <span class="form-hint">Minimum 6 characters</span>
            </div>

            <div class="form-group">
                <label for="role">🎯 I want to join as</label>
                <select id="role" name="role" required>
                    <option value="" disabled selected>Select your role</option>
                    <option value="donor">💝 Donor (I want to donate)</option>
                    <option value="ngo">🤝 NGO (I run an organization)</option>
                </select>
            </div>

            <button type="submit" id="registerBtn" class="btn">
                ✓ Create Account
            </button>
        </form>

        <div id="message"></div>

        <hr style="margin: 24px 0; border: none; border-top: 1px solid #e2e8f0;">
        
        <p style="text-align: center; margin: 0;">
            Already have an account? <a href="/login">👉 Login here</a>
        </p>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
