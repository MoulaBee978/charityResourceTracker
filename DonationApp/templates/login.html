<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharityConnect — Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a class="brand" href="{{ url_for('index') }}">CharityConnect</a>
            <ul class="nav-links">
                <li><a href="{{ url_for('index') }}">🏠 Home</a></li>
                <li><a href="{{ url_for('register') }}">📝 Register</a></li>
                <li><a href="{{ url_for('login') }}">🔐 Login</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1>🎯 Welcome Back</h1>
        <p style="color: #718096; margin-bottom: 24px;">Sign in to continue your charitable journey</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">👤 Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="password">🔑 Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" id="loginBtn" class="btn">
                ✓ Sign In
            </button>
        </form>

        <div id="message"></div>

        <hr style="margin: 24px 0; border: none; border-top: 1px solid #e2e8f0;">

        <p style="text-align: center; margin: 0;">
            Don't have an account yet? <a href="/register">👉 Register here</a>
        </p>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
